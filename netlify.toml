[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback — single-page app, route everything to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache hashed build assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
