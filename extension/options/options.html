<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="options.css" />
  <title>RecruitFill — My Recruiting Profile</title>
</head>
<body>
  <div class="page">
    <header>
      <img src="../icons/icon128.png" alt="" class="logo" />
      <div>
        <h1>My Recruiting Profile</h1>
        <p class="sub">Fill this out once. RecruitFill uses it to autofill every college coach's questionnaire.</p>
      </div>
    </header>

    <div class="toolbar">
      <button id="saveBtn" class="primary">Save profile</button>
      <span id="saveStatus" class="save-status"></span>
      <div class="spacer"></div>
      <button id="exportBtn" class="ghost">Export</button>
      <button id="importBtn" class="ghost">Import</button>
      <input type="file" id="importFile" accept="application/json" hidden />
    </div>

    <form id="profileForm"><!-- groups injected here --></form>

    <div class="toolbar bottom">
      <button id="saveBtn2" class="primary">Save profile</button>
      <span id="saveStatus2" class="save-status"></span>
    </div>

    <p class="privacy">
      🔒 Your information is stored only in this browser (via the extension's local
      storage) and is never sent anywhere. Use <strong>Export</strong> to back it up.
    </p>
  </div>

  <script src="../src/schema.js"></script>
  <script src="options.js"></script>
</body>
</html>
